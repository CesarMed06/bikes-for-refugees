<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bikes for Refugees Scotland</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <nav>
            <div class="nav-logo">
                <img src="bikes-for-refugees_logo-3.jpg" alt="Bikes for Refugees Scotland logo">
            </div>
            <ul class="nav-links">
                <li><a href="#">Home</a></li>
                <li><a href="#">About Us</a></li>
                <li><a href="#">News &amp; Events</a></li>
                <li><a href="#">Contact Us</a></li>
            </ul>
            <a href="#" class="btn btn-donate">Donate Now</a>
        </nav>
    </header>

    <main>

        <div class="banner">
            You've helped us give <span class="banner-num">72</span> bikes to refugees and asylum seekers so far.
            <strong>Thank you!</strong>
        </div>

        <section class="hero">
            <div class="hero-content">
                <h1>Bikes for Refugees</h1>
                <p>Providing donated bikes and accessories to refugees and asylum seekers in Scotland.</p>
                <div class="hero-buttons">
                    <a href="#" class="btn btn-primary">Donate a bike today</a>
                    <a href="#" class="btn btn-outline">Volunteer</a>
                </div>
            </div>
        </section>

    </main>

</body>

</html>
